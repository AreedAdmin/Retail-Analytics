<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI-Augmented Retail Analytics — Technical Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0d13; --panel:#11151d; --elev:#161b24; --border:#1d2430;
  --text:#d7dde6; --muted:#79838f; --dim:#49525f;
  --accent:#4d9bff; --soft:rgba(77,155,255,.12); --line:rgba(77,155,255,.45);
  --grok:#7c5cbf; --amber:#f59e0b; --red:#ef4444; --r:4px;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --head:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden}
body{background-image:
  linear-gradient(rgba(77,155,255,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(77,155,255,.025) 1px,transparent 1px);
  background-size:44px 44px}

/* deck frame ---------------------------------------------------------- */
#deck{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.slide{position:absolute;width:min(96vw,1320px);height:min(94vh,742px);
  padding:54px 64px;display:none;flex-direction:column;
  background:linear-gradient(180deg,#0c1017,#0a0d13);
  border:1px solid var(--border);border-radius:8px;
  box-shadow:0 0 0 1px rgba(0,0,0,.4),0 30px 80px -20px rgba(0,0,0,.8)}
.slide.active{display:flex;animation:in .34s cubic-bezier(.2,.7,.2,1)}
@keyframes in{from{opacity:0;transform:translateY(14px) scale(.992)}to{opacity:1;transform:none}}
.slide::before{content:'';position:absolute;left:0;top:0;width:100%;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent 55%)}

/* typography ---------------------------------------------------------- */
.kicker{font:600 11px/1 var(--mono);letter-spacing:.32em;color:var(--accent);
  text-transform:uppercase;margin-bottom:16px;display:flex;gap:12px;align-items:center}
.kicker::after{content:'';flex:1;height:1px;background:var(--border)}
h1{font:700 56px/1.04 var(--head);letter-spacing:-.02em}
h2{font:700 36px/1.1 var(--head);letter-spacing:-.015em;margin-bottom:6px}
h2 .ac{color:var(--accent)}
.sub{color:var(--muted);font-size:15px;max-width:62ch;margin-top:10px;line-height:1.6}
.mono{font-family:var(--mono)}
.fill{flex:1;display:flex;flex-direction:column;justify-content:center}

/* footer -------------------------------------------------------------- */
.foot{position:absolute;left:64px;right:64px;bottom:24px;display:flex;
  justify-content:space-between;align-items:center;
  font:500 10.5px/1 var(--mono);color:var(--dim);letter-spacing:.14em;text-transform:uppercase}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 4px var(--soft);display:inline-block;margin-right:8px;vertical-align:middle}

/* progress + counter -------------------------------------------------- */
#bar{position:fixed;top:0;left:0;height:2px;background:var(--accent);
  width:0;z-index:50;transition:width .3s ease;box-shadow:0 0 10px var(--accent)}
#idx{position:fixed;right:18px;top:14px;font:600 11px/1 var(--mono);
  color:var(--dim);letter-spacing:.2em;z-index:50}
#idx b{color:var(--accent)}

/* notes --------------------------------------------------------------- */
#notes{position:fixed;left:0;right:0;bottom:0;max-height:42vh;overflow:auto;
  background:#070a0f;border-top:1px solid var(--line);
  padding:20px 32px;display:none;z-index:60;
  font-size:14px;line-height:1.7;color:var(--muted)}
#notes.show{display:block}
#notes b{color:var(--accent);font:600 11px/1 var(--mono);letter-spacing:.2em;
  text-transform:uppercase;display:block;margin-bottom:8px}
.hint{position:fixed;left:18px;top:13px;font:500 10px/1 var(--mono);
  color:var(--dim);letter-spacing:.12em;z-index:50}

/* logo mark ----------------------------------------------------------- */
.mark{position:relative;width:46px;height:46px}
.mark i{position:absolute;display:block;box-sizing:border-box}
.mark i:nth-child(1){width:28px;height:28px;left:0;top:0;border:2px solid var(--accent)}
.mark i:nth-child(2){width:28px;height:28px;right:0;bottom:0;background:var(--accent);opacity:.85}

/* generic visual kit -------------------------------------------------- */
.grid{display:grid;gap:14px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 16px;position:relative;overflow:hidden}
.card .t{font:600 10px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.card .v{font:700 30px/1 var(--head);margin-top:10px}
.card .s{font-size:11px;color:var(--muted);margin-top:7px}
.card.k{border-top:2px solid var(--accent)}
.tile{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 12px;display:flex;flex-direction:column;gap:7px;transition:.18s}
.tile .n{font:600 10px/1 var(--mono);color:var(--dim)}
.tile .l{font:600 13px/1.25 var(--body)}
.tile.on{border-color:var(--line);background:var(--soft)}
.tile.on .n{color:var(--accent)}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--panel);
  border:1px solid var(--border);border-radius:var(--r);padding:9px 13px;
  font:500 12px/1 var(--body);color:var(--text)}
.chip .c{color:var(--accent);font-family:var(--mono);font-size:11px}
.flow{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.arrow{color:var(--dim);font-size:18px}
.big{font:700 44px/1 var(--head)}
.big .u{font-size:15px;color:var(--muted);font-family:var(--mono);margin-left:4px}
.lbl{font:600 10px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.mut{color:var(--muted)} .ac{color:var(--accent)} .am{color:var(--amber)}
svg{display:block;width:100%;height:auto;overflow:visible}
.draw{stroke-dasharray:1;stroke-dashoffset:1;animation:dr 1.1s ease forwards}
.slide.active .draw{animation-play-state:running}
@keyframes dr{to{stroke-dashoffset:0}}
.title-hero{position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;padding:0 90px;
  background:radial-gradient(900px 480px at 78% 30%,rgba(77,155,255,.10),transparent 60%)}
</style>
</head>
<body>
<div id="bar"></div>
<div class="hint mono">← → navigate · N notes · F fullscreen</div>
<div id="idx" class="mono"><b>01</b> / 22</div>
<div id="deck"></div>
<div id="notes"></div>

<script>

const S = [];
const add = (html, notes) => S.push({html, notes});

/* 1 — TITLE */
add(`
<div class="title-hero">

    <div class="mark"><i></i><i></i></div>
    <div>
      <div class="mono" style="font-size:11px;letter-spacing:.3em;color:var(--accent)">RETAIL · ANALYTICS</div>

  </div>

/* 2 — PROBLEM */
add(`
<div class="kicker">The Problem</div>

<div class="fill">

/* 3 — PRODUCT */
add(`
<div class="kicker">The Product</div>
<h2>11 views, one cohesive console</h2>
<div class="fill">
<div class="grid" style="grid-template-columns:repeat(4,1fr)">
 ${[['01','Overview'],['02','Data Explorer'],['03','Promotion Effectiveness'],['04','Price Elasticity'],

</div></div>`,

/* 4 — STACK */
add(`
<div class="kicker">Tech Stack</div>
<h2>Layered &amp; deliberate</h2>
<div class="fill"><div class="grid" style="gap:11px">
 ${[['UI / APP','Gradio 6.9 · custom Palantir CSS · Plotly'],
    ['DATA','pandas · numpy · pyarrow · cached loaders'],
    ['ML / STATS','scikit-learn HistGBR · XGBoost · statsmodels OLS'],
    ['GENAI','Ollama Cloud gpt-oss:120b · Anthropic/OpenAI/local fallback'],
    ['CONFIG','python-dotenv · HF Space secrets'],
    ['DEPLOY','Hugging Face Spaces — free CPU tier']]
  .map((r,i)=>`<div class="card" style="display:flex;align-items:center;gap:20px;padding:13px 18px;border-left:2px solid ${i==3?'var(--accent)':'var(--border)'}">

    <span style="font-size:14px">${r[1]}</span></div>`).join('')}
 <div class="chip" style="align-self:flex-start;margin-top:6px"><span class="c">RULE</span> the dashboard never trains a model — it consumes validated outputs</div>
</div></div>`,
`Design rule is the punchline: models are produced offline in ml/, the app is a pure consumer. We also fixed phantom version pins that would have broken the Space build.`);

/* 5 — ARCHITECTURE */
add(`
<div class="kicker">Architecture</div>
<h2>Contract-driven, layered, decoupled</h2>
<div class="fill">
<svg viewBox="0 0 1180 430" font-family="var(--mono)">
 <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
   <path d="M0,0 L7,3 L0,6 Z" fill="#4d9bff"/></marker></defs>
 ${[['data_raw.csv',40,30,200,46,'#1d2430'],
    ['OFFLINE ml/  ·  HistGBR · XGBoost · OLS',40,120,360,58,'#1d2430'],
    ['Contracts  schemas.py',470,120,300,58,'#4d9bff'],
    ['Loaders  (validated · cached)',40,235,730,52,'#1d2430'],
    ['dashboard/modules/*  —  11 Gradio tabs',40,330,470,60,'#1d2430'],

    ['Ollama Cloud  (streamed)',830,330,310,60,'#1d2430']]

     fill="#11151d" stroke="${b[5]}"/><text x="${b[1]+b[3]/2}" y="${b[2]+b[4]/2+4}"
     fill="#d7dde6" font-size="14" text-anchor="middle">${b[0]}</text></g>`).join('')}
 ${[['M140 76 L140 120'],['M220 178 L470 178'],['M220 178 L300 235'],
    ['M620 178 L620 235'],['M300 287 L260 330'],['M620 287 L650 330'],
    ['M770 360 L830 360']].map(p=>`<path class="draw" d="${p[0]}" stroke="#4d9bff"
    stroke-width="1.6" fill="none" marker-end="url(#ar)"
    pathLength="1" style="animation-delay:${Math.random()*.5}s"/>`).join('')}
</svg>
<div class="sub" style="margin-top:8px">Data is fixed input → models run offline → <span class="ac">contracts</span> decouple ML from UI → the AI layer is a sidecar every module can call.</div>
</div>`,
`Walk it left→right as the connectors draw in. The contracts box is the backbone — ML, analytics, UI and AI teams integrate only through frozen dataclass contracts, enabling parallel work and safe refactors.`);

/* 6 — CONTRACTS */
add(`
<div class="kicker">Data Foundation</div>
<h2>Frozen contracts, validating loaders</h2>
<div class="fill"><div class="flow" style="justify-content:space-between;gap:24px">
 <div class="card" style="flex:1">
  <div class="t">schemas.py — contract</div>
  <pre class="mono" style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.7">@dataclass
ForecastOutput:
  sku_id · period
  y_true · y_pred
  y_lower · y_upper
  model_name</pre>
 </div>
 <div class="arrow">→</div>
 <div class="card" style="flex:1">
  <div class="t">*_loader.py</div>
  <div class="s" style="font-size:13px;margin-top:12px;line-height:1.8">
  validates required columns<br>caches as singleton<br>
  <span class="am">fails loudly</span> → "run the notebook"</div>
 </div>
 <div class="arrow">→</div>
 <div class="card k" style="flex:1">
  <div class="t">module / AI</div>
  <div class="s" style="font-size:13px;margin-top:12px;line-height:1.8">
  charts · KPIs · tables<br>grounding context<br>no hidden coupling</div>
 </div>
</div></div>`,
`The architectural backbone. Loaders raise a clear "run the notebook" error rather than silently breaking — integration is safe and parallelisable.`);

/* 7 — FORECAST */
add(`
<div class="kicker">Service 1 · ML</div>
<h2>Demand Forecasting <span class="mut" style="font-size:18px">— HistGBR</span></h2>
<div class="fill"><div class="flow" style="gap:30px;align-items:stretch">
 <svg viewBox="0 0 560 230" style="flex:1;max-width:560px">
   <rect x="0" y="0" width="560" height="230" fill="none"/>
   <path d="M0,150 C90,120 150,165 230,120 C310,80 390,140 470,95 L560,110"
     class="draw" stroke="#4d9bff" stroke-width="2.5" fill="none" pathLength="1"/>
   <path d="M0,135 C90,105 150,150 230,105 C310,65 390,125 470,80 L560,95
            L560,150 C470,120 390,170 310,120 C230,170 150,135 90,160 L0,170 Z"
     fill="rgba(77,155,255,.12)"/>
   <path d="M0,165 C90,150 150,175 230,150 C310,120 390,160 470,135 L560,140"
     stroke="#79838f" stroke-width="1.5" fill="none" stroke-dasharray="4 4"/>
   <text x="6" y="20" fill="#79838f" font-family="var(--mono)" font-size="11">forecast · 95% band · actual</text>
 </svg>
 <div class="grid" style="grid-template-columns:1fr;gap:12px;width:230px">
   <div class="card k"><div class="t">Test MAE</div><div class="v"><span data-c="58.7">0</span></div></div>
   <div class="card"><div class="t">95% Coverage</div><div class="v"><span data-c="93.5">0</span><span class="mut" style="font-size:16px">%</span></div></div>

 </div>
</div></div>`,
`HistGradientBoostingRegressor on log1p sales, past-only features, chronological split, residual-quantile intervals. Beats naive materially, intervals well-calibrated. Honest: it's a backtest, not a live forecast.`);

/* 8 — PROMO LIFT */
add(`
<div class="kicker">Service 2 · ML</div>
<h2>Promotion Lift <span class="mut" style="font-size:18px">— XGBoost</span></h2>
<div class="fill"><div class="flow" style="gap:30px;align-items:stretch">
 <svg viewBox="0 0 560 240" style="flex:1;max-width:560px" font-family="var(--mono)">
  ${[['SKU 11',92],['SKU 38',59],['SKU 6',53],['SKU 2',46],['SKU 13',43]]
    .map((b,i)=>`<text x="0" y="${30+i*46}" fill="#79838f" font-size="12">${b[0]}</text>

 <div class="grid" style="grid-template-columns:1fr 1fr;gap:12px;width:300px;align-content:center">

/* 9 — ELASTICITY */
add(`

<div class="fill"><div class="flow" style="gap:28px;align-items:stretch">

/* 11 — GROUNDING */
add(`

 ${[['User prompt','plain English question'],

/* ============================================================ ENGINE */
const deck=document.getElementById('deck'), bar=document.getElementById('bar'),
      idx=document.getElementById('idx'), notesEl=document.getElementById('notes');
let cur=0;
S.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide'; el.dataset.i=i;
  el.innerHTML=s.html+`<div class="foot"><span><span class="dot"></span>Retail Analytics · AI Console</span><span>Imperial College · Retail &amp; Marketing Analytics</span></div>`;
  deck.appendChild(el);
});
const slides=[...document.querySelectorAll('.slide')];

function animateCounts(el){
  el.querySelectorAll('[data-c]').forEach(n=>{
    const target=parseFloat(n.dataset.c), dec=+(n.dataset.dec||0);
    let t0=null, dur=900;
    function step(ts){ t0=t0||ts; const p=Math.min((ts-t0)/dur,1);
      const e=1-Math.pow(1-p,3);
      n.textContent=(target*e).toFixed(dec);
      if(p<1) requestAnimationFrame(step); else n.textContent=target.toFixed(dec); }
    n.textContent=(0).toFixed(dec); requestAnimationFrame(step);
  });
}
function show(i){
  cur=Math.max(0,Math.min(S.length-1,i));
  slides.forEach((s,k)=>s.classList.toggle('active',k===cur));
  bar.style.width=((cur+1)/S.length*100)+'%';
  idx.innerHTML=`<b>${String(cur+1).padStart(2,'0')}</b> / ${S.length}`;
  notesEl.innerHTML=`<b>Speaker Notes — ${cur+1}/${S.length}</b>${S[cur].notes}`;
  animateCounts(slides[cur]);
}
function go(d){ show(cur+d); }
addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)){e.preventDefault();go(1);}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();go(-1);}
  else if(e.key==='Home')show(0); else if(e.key==='End')show(S.length-1);
  else if(e.key.toLowerCase()==='n')notesEl.classList.toggle('show');
  else if(e.key.toLowerCase()==='f'){ document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen(); }
});
let sx=0; addEventListener('touchstart',e=>sx=e.touches[0].clientX);
addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>50)go(dx<0?1:-1);});
addEventListener('click',e=>{ if(e.target.closest('#notes'))return;
  go(e.clientX < innerWidth*0.32 ? -1 : 1); });
show(0);
</script>
